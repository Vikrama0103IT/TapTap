<!DOCTYPE html>
<html lang="en">
<head>
	<title>TapTap</title>
	
	<link href="style.css" rel="stylesheet">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
	
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,600" rel="stylesheet">

	<!-- favicon -->
	<link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png">
	<link rel="icon" type="image/png" href="/favicons/favicon-32x32.png" sizes="32x32">
	<link rel="icon" type="image/png" href="/favicons/favicon-16x16.png" sizes="16x16">
	<link rel="manifest" href="/favicons/manifest.json">
	<link rel="mask-icon" href="/favicons/safari-pinned-tab.svg" color="#0b1d31">
	<link rel="shortcut icon" href="/favicons/favicon.ico">
	<meta name="msapplication-config" content="/favicons/browserconfig.xml">

</head>
<body ontouchstart="">

	<div class="main-wrapper">

		<!-- GAME MENU PAGE -->
		<div id="pageGameMenu" class="page-cont page-game-menu">
			<div class="home-layout">

				<!-- Ball + title group -->
				<div class="home-top">
					<div class="tpbl-circle c-blue gm-menu-logo-bg"></div>
					<h1 class="gm-menu-title">Tap Tap </h1>
					<p class="gm-menu-subtitle"></p>
				</div>

				<!-- Hint + button -->
				<div class="home-bottom">
					<p class="home-tip">
						Tap the <span class="tip-blue">color</span> shown &nbsp;&middot;&nbsp; Avoid <span class="tip-red">others</span>
					</p>
					<button id="newGameBtn" class="gm-btn btn-blue" type="button">Tap to Play</button>
				</div>

			</div>
		</div>



		<!-- GAME PLAY AREA PAGE -->
		<div id="pagePlayArea" class="page-cont page-play-area">

			<div class="game-stats-cont">
				<div class="gm-stats-wrapper">
					<div class="stat-wrapper">
						<div class="gm-stats-title">Score</div>
						<div id="gmStatsScore" class="gm-stats-value">0</div>
					</div>
				</div>
			</div>

			<!-- Color Toast -->
			<div id="colorToast" class="color-toast">
				<div id="ciColorBall" class="toast-ball c-blue"></div>
				<span class="toast-label">Tap</span>
				<span id="ciColorName" class="toast-text">BLUE</span>
			</div>

			<div id="wrongPopup" class="wrong-popup">WRONG!</div>
			<div id="gameSpace" class="game-space">
				<!-- Where the magic happens -->
			</div>
		</div>

		<!-- GAME PAUSE PAGE -->
		<div id="pagePauseMenu" class="page-cont page-pause-menu">
			<div class="fixed-75w-wrapper">
				<div class="info-screen-title-cont">
					<div class="info-screen-icon puz-icon"></div>
					<div class="info-screen-ttl-txt-bld">GAME PAUSED</div>
				</div>
				<div class="info-screen-txt-cont">
					<div class="info-screen-body-txt-reg">Score</div>
					<div id="lvlPausedScore" class="lvl-fnshd-score-nmb">521</div>
				</div>
				<div class="puz-menu-btnz-cont">
					<button id="pmCntnuGmBtn" class="gm-btn btn-blue">Continue</button>
					<button id="pmRstrtLvlBtn" class="gm-btn pm-rstrt-lvl-btn">Restart</button>
				</div>
			</div>
		</div>



	</div>

	<!-- logic & brain -->
	<script src="Script.js"></script>
</body>
</html>
